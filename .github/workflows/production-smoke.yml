name: Production Smoke

# Manual-only read-only smoke check against the deployed public URLs (docs/PRODUCTION_SMOKE_TEST.md).
# No secrets, no order APIs, GET-only (+ the /api/reports 405 check). Not run on push/PR to avoid
# hitting external services on every commit. Override targets via the inputs below.
on:
  workflow_dispatch:
    inputs:
      frontend_url:
        description: "Production frontend URL"
        required: false
        default: "https://fx-strategy-lab.vercel.app"
      backend_url:
        description: "Production backend URL"
        required: false
        default: "https://fx-strategy-lab.onrender.com"

jobs:
  production-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Production smoke (read-only)
        working-directory: frontend
        env:
          PRODUCTION_FRONTEND_URL: ${{ github.event.inputs.frontend_url }}
          PRODUCTION_BACKEND_URL: ${{ github.event.inputs.backend_url }}
        run: npm run e2e:prod

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore
